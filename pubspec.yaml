name: tandem
description: "Tandem — Grow together. Daily. A life tracker and duo accountability app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.5.0
  rxdart: ^0.28.0

  # Charts
  fl_chart: ^0.70.2

  # Animations
  rive: ^0.14.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Deep Links
  app_links: ^6.4.0

  # Auth
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  timezone: ^0.9.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  share_plus: ^12.0.2
  path: ^1.9.0
  path_provider: ^2.1.2
  flutter_native_splash: ^2.4.4
  pedometer: ^4.1.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  mockito: ^5.4.4
  build_resolvers: ^2.4.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#7C5CFF"
  image: "assets/splash/splash_bloop.png"
  android_12:
    image: "assets/splash/splash_bloop.png"
    color: "#7C5CFF"
  fullscreen: true

flutter:
  uses-material-design: true
